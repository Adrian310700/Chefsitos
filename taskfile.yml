version: "3"

vars:
  OBS_PROFILES: --profile observability --profile loadtest
  BASE_URL: http://uamishop-gateway:8080

tasks:
  k6:smoke:
    desc: "Ejecuta prueba smoke"
    cmds:
      - |
        TEST_ID="${TEST_ID:-smoke-$(date +%Y%m%d-%H%M%S)}"
        echo "Running smoke test with TEST_ID=$TEST_ID"
        docker compose {{.OBS_PROFILES}} run --rm \
          -e BASE_URL={{.BASE_URL}} \
          -e K6_PROMETHEUS_RW_STALE_MARKERS=true \
          k6 run \
          --tag testid=$TEST_ID \
          --tag suite=uamishop \
          --tag test_type=smoke \
          --out experimental-prometheus-rw \
          /scripts/api-smoke.js

  k6:load:
    desc: "Ejecuta prueba load"
    cmds:
      - |
        TEST_ID="${TEST_ID:-load-$(date +%Y%m%d-%H%M%S)}"
        echo "Running load test with TEST_ID=$TEST_ID"
        docker compose {{.OBS_PROFILES}} run --rm \
          -e BASE_URL={{.BASE_URL}} \
          -e K6_PROMETHEUS_RW_STALE_MARKERS=true \
          k6 run \
          --tag testid=$TEST_ID \
          --tag suite=uamishop \
          --tag test_type=load \
          --out experimental-prometheus-rw \
          /scripts/api-load.js

  k6:stress:
    desc: "Ejecuta prueba stress"
    cmds:
      - |
        TEST_ID="${TEST_ID:-stress-$(date +%Y%m%d-%H%M%S)}"
        echo "Running stress test with TEST_ID=$TEST_ID"
        docker compose {{.OBS_PROFILES}} run --rm \
          -e BASE_URL={{.BASE_URL}} \
          -e K6_PROMETHEUS_RW_STALE_MARKERS=true \
          k6 run \
          --tag testid=$TEST_ID \
          --tag suite=uamishop \
          --tag test_type=stress \
          --out experimental-prometheus-rw \
          /scripts/api-stress.js

  k6:all:
    desc: "Ejecuta smoke + load + stress"
    cmds:
      - task: k6:smoke
      - task: k6:load
      - task: k6:stress
