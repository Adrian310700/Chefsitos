server:
  port: 8083

api:
  V1: v1

spring:
  application:
    name: uamishop-ventas
  datasource:
    url: jdbc:mysql://localhost:3306/uamishop_ventas?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: uamishop
    password: uamishop
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: ventas
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

catalogo:
  service:
    url: http://localhost:8081

carrito:
  service:
    url: http://localhost:8083

resilience4j:
  circuitbreaker:
    instances:
      catalogoService:                            # nombre en la anotacion
        slidingWindowSize: 5                      # evalua las ultimas 5 llamadas
        minimumNumberOfCalls: 3                   # minimo de llamadas antes de abrir el CB
        failureRateThreshold: 50                  # porcentaje de fallos antes de abrir el CB
        waitDurationInOpenState: 10s              # espera 10s antes de pasar a semi abierto
        permittedNumberOfCallsInHalfOpenState: 3  # prueba con 1 llamada
        registerHealthIndicator: true             # expone el estado en /actuator/health