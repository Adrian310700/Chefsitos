# Perfil para ejecución local (fuera de Docker)
# Actívalo con: ./mvnw spring-boot:run -Dspring-boot.run.profiles=local
#
# Los microservicios deben estar corriendo en el host (o en Docker con puertos expuestos)
# y accesibles vía localhost en sus respectivos puertos.
spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            # Catalogo - Productos
            - id: catalogo-productos
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/productos/**

            # Catalogo - Categorias
            - id: catalogo-categorias
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/categorias/**

            # Ordenes
            - id: ordenes-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/ordenes/**

            # Carritos
            - id: carritos-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/v1/carritos/**

management:
  endpoints:
    web:
      exposure:
        # Exponemos prometheus para VictoriaMetrics y health para Docker
        include: health, info, prometheus
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
  metrics:
    tags:
      # Esto ayuda a filtrar en Grafana/Victoria por nombre de microservicio
      application: ${spring.application.name}
