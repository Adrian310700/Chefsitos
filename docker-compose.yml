name: uamishop-app

services:
  mysql:
    image: mysql:latest
    container_name: uamishop-mysql
    environment:
      MYSQL_DATABASE: uamishop
      MYSQL_USER: uamishop
      MYSQL_PASSWORD: uamishop
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init-catalogo-db.sql:/docker-entrypoint-initdb.d/init-catalogo-db.sql:ro
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: uamishop-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  uamishop-catalogo:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: uamishop-catalogo
        SERVICE_PORT: 8081
    image: uamishop-catalogo:latest
    container_name: uamishop-catalogo
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/uamishop_catalogo?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: uamishop
      SPRING_DATASOURCE_PASSWORD: uamishop
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  uamishop-ordenes:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: uamishop-ordenes
        SERVICE_PORT: 8082
    image: uamishop-ordenes:latest
    container_name: uamishop-ordenes
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/uamishop_ordenes?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: uamishop
      SPRING_DATASOURCE_PASSWORD: uamishop
      SPRING_RABBITMQ_HOST: rabbitmq
      CATALOGO_SERVICE_URL: "http://uamishop-catalogo:8081"
      CARRITO_SERVICE_URL: "http://uamishop-ventas:8083"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  uamishop-ventas:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: uamishop-ventas
        SERVICE_PORT: 8083
    image: uamishop-ventas:latest
    container_name: uamishop-ventas
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/uamishop_ventas?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: uamishop
      SPRING_DATASOURCE_PASSWORD: uamishop
      SPRING_RABBITMQ_HOST: rabbitmq
      CATALOGO_SERVICE_URL: "http://uamishop-catalogo:8081"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  uamishop-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: uamishop-gateway
        SERVICE_PORT: 8080
    image: uamishop-gateway:latest
    container_name: uamishop-gateway
    ports:
      - "8080:8080"
    depends_on:
      - uamishop-catalogo
      - uamishop-ordenes
      - uamishop-ventas
    restart: unless-stopped

  chefsitos-frontend:
    image: hansdd/chefsitos-front:latest
    container_name: chefsitos-frontend
    profiles: ["frontend", "all"]
    ports:
      - "8084:80"
    depends_on:
      - uamishop-gateway
      - uamishop-catalogo
      - uamishop-ordenes
      - uamishop-ventas
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Almacenamiento de métricas
  victoriametrics:
    image: victoriametrics/victoria-metrics:latest # Cambiado de stable a latest
    container_name: uamishop-victoriametrics
    profiles: ["observability", "all"]
    ports:
      - "8428:8428"
    volumes:
      - vmdata:/storage
    restart: unless-stopped

  # Recolector de métricas
  vmagent:
    image: victoriametrics/vmagent:latest
    container_name: uamishop-vmagent
    profiles: ["observability", "all"]
    depends_on:
      - victoriametrics
      # - uamishop-catalogo
      # - uamishop-ordenes
      # - uamishop-ventas
      # - uamishop-gateway
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - vmagent_data:/vmagentdata
    command:
      - "--promscrape.config=/etc/prometheus/prometheus.yml"
      - "--remoteWrite.url=http://victoriametrics:8428/api/v1/write"
      - "--remoteWrite.tmpDataPath=/vmagentdata"
    restart: unless-stopped

  # Visualizador Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: uamishop-grafana
    profiles: ["observability", "all"]
    ports:
      - "3000:3000"
    volumes:
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - victoriametrics
    restart: unless-stopped

  k6:
    image: grafana/k6:latest
    container_name: uamishop-k6
    profiles: ["loadtest"]
    working_dir: /scripts
    volumes:
      - ./docker/k6:/scripts:ro
    environment:
      K6_PROMETHEUS_RW_SERVER_URL: http://victoriametrics:8428/api/v1/write
      K6_PROMETHEUS_RW_TREND_STATS: p(90),p(95),p(99),min,max,avg
      K6_PROMETHEUS_RW_PUSH_INTERVAL: 5s
    entrypoint: ["k6"]
    depends_on:
      - uamishop-gateway
      - victoriametrics
    restart: "no"

volumes:
  mysql_data:
  vmdata:
  vmagent_data:

networks:
  default:
    name: uamishop-network
