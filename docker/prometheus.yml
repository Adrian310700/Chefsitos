global:
  scrape_interval: 10s
  scrape_timeout: 5s

scrape_configs:
  - job_name: "uamishop-spring"
    metrics_path: /actuator/prometheus
    scheme: http
    static_configs:
      - targets: ["uamishop-catalogo:8081"]
        labels:
          service: "uamishop-catalogo"
      - targets: ["uamishop-ordenes:8082"]
        labels:
          service: "uamishop-ordenes"
      - targets: ["uamishop-ventas:8083"]
        labels:
          service: "uamishop-ventas"
      - targets: ["uamishop-gateway:8080"]
        labels:
          service: "uamishop-gateway"
